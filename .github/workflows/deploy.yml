name: Deploy to VPS

# Builds the static export and rsyncs it into the Plesk VPS doc-root over SSH,
# on every push to main. Same pattern as the belegendary.org deploy.
# Inert (build-only) until the DEPLOY_* repository secrets are set — so nothing
# deploys by accident. See DEPLOY.md.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build # next build with output:"export" → ./out

      - name: Deploy out/ to the VPS (rsync over SSH)
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::warning::DEPLOY_SSH_KEY not set — skipping deploy (build still validated)."
            exit 0
          fi
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # --delete keeps the server matching the build; never touch .well-known
          # (SSL/ACME). Trailing slash on out/ copies contents, not the folder.
          rsync -avz --delete --exclude='.well-known' \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=accept-new" \
            out/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
          echo "Deployed to $DEPLOY_HOST:$DEPLOY_PATH"
